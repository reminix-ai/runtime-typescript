name: 🚀 Publish to npm

on:
  release:
    types: [published]

jobs:
  check:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Verify tag matches runtime version
        run: pnpm check-tag-version

      - name: Build packages
        run: pnpm build

      - name: Publish packages
        # pnpm publish --recursive automatically skips packages marked as "private": true
        run: pnpm -r --filter './packages/**' publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Add Package Links to Summary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "## 📦 Published to npm" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for pkg in packages/*/package.json; do
            if [ -f "$pkg" ]; then
              NAME=$(node -e "console.log(require('./$pkg').name)")
              PRIVATE=$(node -e "console.log(require('./$pkg').private || false)")
              if [ "$PRIVATE" != "true" ]; then
                echo "- [\`$NAME@$VERSION\`](https://www.npmjs.com/package/$NAME/v/$VERSION)" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done
